/**:
  ros__parameters:
    gate_centering:
      takeoff_altitude: 1.3
      forward_distance: 2.0
      gate_width: 1.5               
      centering_tolerance: 0.15     
      waypoint_tolerance: 0.3
      control_mode: "velocity"      
      max_velocity: 0.2             
      proportional_gain: 0.5        
      rotation_angle: 90.0
      
      detection_range_min: 1.5      # Min forward distance for gate detection (m)
      detection_range_max: 2.5      # Max forward distance for gate detection (m)
      roi_lateral: 0.5              # Lateral ROI width (±m from center)
      cluster_epsilon: 0.15         # Max distance to group points as single pole (m)
      min_cluster_points: 10        # Min points required per pole cluster
      min_pole_height: 0.5          # Min vertical span for valid pole (m)
      target_height: 0.75           # Target center height (0.75m = center of 1.5m gate)          

    
      
